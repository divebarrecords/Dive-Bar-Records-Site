<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIGS // DIVE BAR RECORDS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/jci8qvf.css">
    
    <style>
        /* --- COPY OF CORE STYLES FROM INDEX.HTML --- */
        :root {
            --bg: #0f0f0f;
            --paper: #ecebe4;
            --accent: #d4af37;
            --ink: #1a1a1a;
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--paper);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NOISE OVERLAYS (EXACT MATCH) --- */
        .texture-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9998; pointer-events: none; opacity: 0.05;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 500 500' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: cover;
        }

        .fuzzy-overlay {
            position: fixed; inset: -50%; z-index: -9999; pointer-events: none; opacity: 0.04;
            background-color: #fff;
        }
        .fuzzy-overlay::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: grain-flicker 0.15s steps(1) infinite;
        }
        @keyframes grain-flicker {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2%, -3%); }
            50% { transform: translate(3%, 1%); }
            75% { transform: translate(-1%, 2%); }
            100% { transform: translate(2%, -2%); }
        }

        /* --- HEADER STYLES --- */
        .main-header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%;
        }
        .header-logo {
            font-family: "plunct", sans-serif; font-size: 2rem;
            color: var(--paper); text-decoration: none; letter-spacing: -1px;
        }
        .nav-links a {
            text-decoration: none; color: var(--paper);
            font-family: 'Special Elite'; font-size: 0.8rem;
            padding: 5px 12px; transition: var(--transition);
        }
        .nav-links a:hover { background: var(--accent); color: var(--bg); }

        /* --- GIGS PAGE SPECIFIC --- */
        .gigs-section {
            padding: 160px 5% 100px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .label-tape {
            background: #1a1a1a; color: var(--accent);
            padding: 5px 15px; font-family: 'Special Elite';
            display: inline-block; transform: rotate(-1deg);
            box-shadow: 2px 2px 0px var(--accent);
            margin-bottom: 20px; text-transform: uppercase;
        }

        .gigs-header h1 {
            font-family: 'Syncopate';
            font-size: clamp(2.5rem, 8vw, 4rem);
            line-height: 1;
            margin-bottom: 40px;
        }

        /* Bandsintown Widget Styling Container */
        .widget-vessel {
            border: 1px solid #222;
            padding: 40px;
            background: rgba(17, 17, 17, 0.5);
            transition: var(--transition);
        }
        .widget-vessel:hover { border-color: var(--accent); }

        footer { padding: 80px 5%; border-top: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.5; }

        @media (max-width: 900px) {
            .gigs-section { padding-top: 120px; }
            .nav-links { display: none; }
            footer { flex-direction: column; align-items: center; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="fuzzy-overlay"></div>
    <div class="texture-overlay"></div>

    <nav class="main-header">
        <a href="index.html" class="header-logo">DIVE BAR RECORDS</a>
        <div class="nav-links">
            <a href="index.html">← BACK TO BASE</a>
        </div>
    </nav>

    <main class="gigs-section">
        <div class="label-tape">004 / LIVE TRANSMISSIONS</div>
        <div class="gigs-header">
            <h1>GIGS &<br>EVENTS</h1>
        </div>

        <div class="widget-vessel">
            <script charset="utf-8" src="https://widget.bandsintown.com/main.min.js"></script>
            <a class="bit-widget-initializer" 
               data-artist-name="Dirty Word" 
               data-display-local-dates="true" 
               data-display-past-dates="true" 
               data-auto-style="false" 
               data-text-color="#ecebe4" 
               data-link-color="#d4af37" 
               data-background-color="transparent" 
               data-display-limit="15" 
               data-link-text-color="#1a1a1a"></a>
        </div>
    </main>

    <footer>
        <div>DIVE BAR RECORDS // LIVE DEPT</div>
        <div>YOUR MUSIC, YOUR WAY.</div>
        <div>© ALL RIGHTS RESERVED</div>
    </footer>
</body>
</html>
