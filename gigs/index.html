<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIGS // DIVE BAR RECORDS</title>
    <link rel="shortcut icon" type="image/x-icon" href="https://raw.githubusercontent.com/divebarrecords/Dive-Bar-Records-Site/refs/heads/main/DB%20favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;700&family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/jci8qvf.css">
    
    <style>
        :root {
            --bg: #0f0f0f;
            --paper: #ecebe4;
            --accent: #d4af37;
            --ink: #1a1a1a;
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--paper);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NOISE OVERLAYS --- */
        .texture-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9998; pointer-events: none; opacity: 0.05;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 500 500' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: cover;
        }

        .fuzzy-overlay {
            position: fixed; inset: -50%; z-index: -9999; pointer-events: none; opacity: 0.04;
            background-color: #fff;
        }
        .fuzzy-overlay::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: grain-flicker 0.15s steps(1) infinite;
        }
        @keyframes grain-flicker {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2%, -3%); }
            50% { transform: translate(3%, 1%); }
            75% { transform: translate(-1%, 2%); }
            100% { transform: translate(2%, -2%); }
        }

        /* --- HEADER STYLES --- */
        .main-header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%;
        }
        .header-logo {
            font-family: "plunct", sans-serif; font-size: 2rem;
            color: var(--paper); text-decoration: none; letter-spacing: -1px;
        }
        .nav-links a {
            text-decoration: none; color: var(--paper);
            font-family: 'Special Elite'; font-size: 0.8rem;
            padding: 5px 12px; transition: var(--transition);
        }
        .nav-links a:hover { background: var(--accent); color: var(--bg); }

        /* --- GIGS PAGE CONTENT --- */
        .gigs-section {
            padding: 160px 5% 100px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .label-tape {
            background: #1a1a1a; color: var(--accent);
            padding: 5px 15px; font-family: 'Special Elite';
            display: inline-block; transform: rotate(-1deg);
            box-shadow: 2px 2px 0px var(--accent);
            margin-bottom: 20px; text-transform: uppercase;
        }

        .gigs-header h1 {
            font-family: 'Syncopate';
            font-size: clamp(2.5rem, 8vw, 4rem);
            line-height: 1;
            margin-bottom: 40px;
        }

        /* --- API GIG LIST STYLING --- */
        .widget-vessel {
            border: 1px solid #222;
            padding: 20px;
            background: rgba(17, 17, 17, 0.3);
            min-height: 200px;
        }

        .gig-row {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1fr;
            padding: 30px 10px;
            border-bottom: 1px solid #222;
            align-items: center;
            transition: var(--transition);
        }
        .gig-row:last-child { border-bottom: none; }
        .gig-row:hover { background: rgba(212, 175, 55, 0.03); }

        .gig-date {
            font-family: 'Special Elite';
            color: var(--accent);
            font-size: 1.1rem;
        }

        .venue-info .venue-name {
            display: block;
            font-family: 'Syncopate';
            font-size: 1rem;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .venue-info .location {
            font-size: 0.75rem;
            opacity: 0.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-ticket {
            font-family: 'Special Elite';
            color: var(--paper);
            text-decoration: none;
            border: 1px solid #333;
            padding: 10px 15px;
            font-size: 0.7rem;
            text-align: center;
            transition: var(--transition);
        }
        .btn-ticket:hover {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .status-msg {
            font-family: 'Special Elite';
            opacity: 0.5;
            padding: 40px;
            text-align: center;
            font-size: 0.9rem;
        }

        footer { padding: 80px 5%; border-top: 1px solid #222; display: flex; justify-content: space-between; font-size: 0.8rem; opacity: 0.5; }

        @media (max-width: 900px) {
            .gigs-section { padding-top: 120px; }
            .gig-row { grid-template-columns: 1fr; text-align: center; gap: 20px; }
            .nav-links { display: none; }
            footer { flex-direction: column; align-items: center; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="fuzzy-overlay"></div>
    <div class="texture-overlay"></div>

    <nav class="main-header">
        <a href="../" class="header-logo">DIVE BAR RECORDS</a>
        <div class="nav-links">
            <a href="../">← BACK TO BASE</a>
        </div>
    </nav>

    <main class="gigs-section">
        <div class="label-tape">004 / DIVE BAR LIVE</div>
        <div class="gigs-header">
            <h1>GIGS &<br>EVENTS</h1>
        </div>

        <div class="widget-vessel" id="gigs-output">
            <div class="status-msg">LOADING DATES...</div>
        </div>
    </main>

    <footer>
        <div>DIVE BAR RECORDS // LIVE DEPT</div>
        <div>YOUR MUSIC, YOUR WAY.</div>
        <div>© ALL RIGHTS RESERVED</div>
    </footer>

<script>
    // 1. Use a string-based App ID (Bandsintown prefers names/slugs over hex keys for public API)
    // If hex key doesn't work, try just "dive_bar_records"
    const APP_ID = "40af8d519748e771c95a9c2ca3cb4ebc"; 

    // 2. Just type the names normally here - no more %20
    const ARTISTS = [
        "Dirty Word"
    ]; 
    
    const output = document.getElementById('gigs-output');

    // 3. Switching to AllOrigins proxy - it's generally more reliable
    const PROXY = "https://api.allorigins.win/get?url=";

    async function getAllLiveDates() {
        try {
            let allEvents = [];

            const fetchPromises = ARTISTS.map(artist => {
                // Encode the name once here
                const cleanName = encodeURIComponent(artist);
                const targetUrl = `https://rest.bandsintown.com/artists/${cleanName}/events?app_id=${APP_ID}`;
                
                // We use the AllOrigins format
                return fetch(`${PROXY}${encodeURIComponent(targetUrl)}`)
                    .then(res => {
                        if (!res.ok) throw new Error('Proxy Link Failed');
                        return res.json();
                    })
                    .then(data => {
                        // AllOrigins wraps the result in a .contents string
                        return JSON.parse(data.contents);
                    });
            });

            const results = await Promise.all(fetchPromises);

            results.forEach(eventList => {
                if (Array.isArray(eventList)) {
                    allEvents = allEvents.concat(eventList);
                }
            });

            if (allEvents.length === 0) {
                output.innerHTML = '<div class="status-msg">NO CURRENT DATES DETECTED.</div>';
                return;
            }

            // Sort by date
            allEvents.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));

            output.innerHTML = ''; 

            allEvents.forEach(event => {
                const dateObj = new Date(event.datetime);
                const formattedDate = dateObj.toLocaleDateString('en-GB', {
                    day: '2-digit', month: 'short', year: 'numeric'
                }).toUpperCase();

                const gigHTML = `
                    <div class="gig-row">
                        <div class="gig-date">${formattedDate}</div>
                        <div class="venue-info">
                            <span class="venue-name">${event.venue.name}</span>
                            <span class="location">${event.venue.city}, ${event.venue.country}</span>
                            <div style="font-size: 0.6rem; color: var(--accent); font-family: 'Special Elite'; margin-top: 5px; opacity: 0.8;">
                                SOURCE: ${event.lineup[0].toUpperCase()}
                            </div>
                        </div>
                        <a href="${event.url}" target="_blank" class="btn-ticket">GET ACCESS →</a>
                    </div>
                `;
                output.innerHTML += gigHTML;
            });

        } catch (err) {
            console.error("Satellite Error:", err);
            output.innerHTML = '<div class="status-msg">ENCRYPTION ERROR: CONNECTION FAILED.</div>';
        }
    }

    getAllLiveDates();
</script>
</body>
</html>
